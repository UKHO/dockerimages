repos:
- repo: https://github.com/hadolint/hadolint
  rev: v2.14.0
  hooks:
    - id: hadolint-docker
      args: []
      files: ^.{1,}/.{1,}/Dockerfile$
      additional_dependencies: []
      stages: [pre-commit]
- repo: https://github.com/trufflesecurity/trufflehog
  rev: v3.90.8
  hooks:
    - id: trufflehog
      files: ^.{1,}/.{1,}/Dockerfile$
      additional_dependencies: []
      stages: [pre-commit]