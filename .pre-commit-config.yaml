repos:
- repo: https://github.com/hadolint/hadolint
  rev: v2.14.0
  hooks:
    - id: hadolint
      args: []
      files: ^Dockerfile$
      additional_dependencies: []
      stages: [pre-commit]
- repo: https://github.com/trufflesecurity/trufflehog
  rev: v3.90.8
  hooks:
    - id: trufflehog
      args: ['--entropy=False', '--json']
      files: ^Dockerfile$
      additional_dependencies: []
      stages: [pre-commit]